<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skivvy Playground</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #1a1b26;
        display: flex;
        flex-direction: column;
      }

      #toolbar {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px 14px;
        background: #16161e;
        border-bottom: 1px solid #2d2f3f;
        color: #a9b1d6;
        font-family: system-ui, sans-serif;
        font-size: 13px;
      }

      #toolbar label {
        opacity: 0.7;
        user-select: none;
      }

      #toolbar select {
        background: #24283b;
        color: #c0caf5;
        border: 1px solid #414868;
        border-radius: 4px;
        padding: 3px 8px;
        font-size: 13px;
        cursor: pointer;
        outline: none;
      }

      #toolbar select:hover {
        border-color: #7aa2f7;
      }

      #terminal {
        flex: 1;
        min-height: 0;
      }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <label for="category-select">Examples:</label>
      <select id="category-select">
        <option value="all">All</option>
        <option value="basics">Basics</option>
        <option value="diffs">Diffs</option>
        <option value="matchers">Matchers</option>
        <option value="variables">Variables</option>
        <option value="oauth">OAuth</option>
        <option value="headers">Headers</option>
        <option value="graphql">GraphQL</option>
      </select>
    </div>
    <div id="terminal"></div>
    <script>
      (function () {
        var p = new URLSearchParams(window.location.search).get('category') || 'all';
        var sel = document.getElementById('category-select');
        sel.value = p;
        sel.addEventListener('change', function () {
          var url = new URL(window.location.href);
          url.searchParams.set('category', sel.value);
          window.location.href = url.toString();
        });
      })();
    </script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
