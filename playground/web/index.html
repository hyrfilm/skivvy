<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skivvy Playground</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #1a1b26;
        display: flex;
        flex-direction: column;
      }

      #toolbar {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px 14px;
        background: #16161e;
        border-bottom: 1px solid #2d2f3f;
        color: #a9b1d6;
        font-family: system-ui, sans-serif;
        font-size: 13px;
      }

      #toolbar label {
        opacity: 0.7;
        user-select: none;
      }

      #toolbar select {
        background: #24283b;
        color: #c0caf5;
        border: 1px solid #414868;
        border-radius: 4px;
        padding: 3px 8px;
        font-size: 13px;
        cursor: pointer;
        outline: none;
        max-width: 380px;
      }

      #toolbar select:hover {
        border-color: #7aa2f7;
      }

      #toolbar .hint {
        opacity: 0.45;
        font-size: 12px;
        margin-left: 4px;
      }

      #terminal {
        flex: 1;
        min-height: 0;
      }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <label for="category-select">Examples:</label>
      <select id="category-select">
        <option value="basics">Basics — simple request/response tests</option>
        <option value="diffs">Diffs — readable output when a test fails</option>
        <option value="matchers">Matchers — $gt, $between, $valid_url, $unique, ...</option>
        <option value="variables">Variables — store values and reuse them across tests</option>
        <option value="oauth">OAuth — login, refresh tokens, authenticated requests</option>
        <option value="headers">Headers — check response headers, send custom headers</option>
        <option value="graphql">GraphQL — subset matching on deeply nested responses</option>
        <option value="readme">README examples — the tests from the project README</option>
      </select>
      <span class="hint">← switch examples, or edit tests and api responses directly in the terminal</span>
    </div>
    <div id="terminal"></div>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var p = params.get('overlay') ? '' : (params.get('category') || 'basics');
        var sel = document.getElementById('category-select');
        if (p) sel.value = p;
        sel.addEventListener('change', function () {
          var url = new URL(window.location.href);
          url.searchParams.set('category', sel.value);
          url.searchParams.delete('overlay');
          url.searchParams.delete('command');
          url.searchParams.delete('run');
          window.location.href = url.toString();
        });
      })();
    </script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
