<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skivvy Playground</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #1a1b26;
        display: flex;
        flex-direction: column;
      }

      #toolbar {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px 14px;
        background: #16161e;
        border-bottom: 1px solid #2d2f3f;
        color: #a9b1d6;
        font-family: system-ui, sans-serif;
        font-size: 13px;
      }

      #toolbar label {
        opacity: 0.7;
        user-select: none;
      }

      #toolbar select {
        background: #24283b;
        color: #c0caf5;
        border: 1px solid #414868;
        border-radius: 4px;
        padding: 3px 8px;
        font-size: 13px;
        cursor: pointer;
        outline: none;
        max-width: 380px;
      }

      #toolbar select:hover {
        border-color: #7aa2f7;
      }

      #toolbar .hint {
        opacity: 0.45;
        font-size: 12px;
        margin-left: 4px;
      }

      #toolbar .spacer { flex: 1; }

      #toggle-editor {
        background: transparent;
        color: #565f89;
        border: 1px solid #2d2f3f;
        border-radius: 4px;
        padding: 3px 10px;
        font-size: 12px;
        cursor: pointer;
        font-family: system-ui, sans-serif;
        flex-shrink: 0;
      }

      #toggle-editor:hover {
        color: #a9b1d6;
        border-color: #414868;
      }

      /* ── layout ─────────────────────────────────────── */

      #workspace {
        flex: 1;
        display: flex;
        min-height: 0;
      }

      #terminal {
        flex: 1;
        min-width: 0;
      }

      /* ── editor panel ───────────────────────────────── */

      #editor-panel {
        width: 380px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        border-left: 1px solid #2d2f3f;
        overflow: hidden;
        transition: width 0.15s ease;
      }

      #editor-panel.collapsed {
        width: 0;
        border-left: none;
      }

      /* file tree */

      #file-tree {
        flex-shrink: 0;
        max-height: 38%;
        overflow-y: auto;
        padding: 6px 0;
        border-bottom: 1px solid #2d2f3f;
      }

      #file-tree::-webkit-scrollbar { width: 4px; }
      #file-tree::-webkit-scrollbar-track { background: transparent; }
      #file-tree::-webkit-scrollbar-thumb { background: #2d2f3f; border-radius: 2px; }

      .dir-label {
        padding: 6px 10px 2px;
        font-size: 10px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #414868;
        user-select: none;
        font-family: system-ui, sans-serif;
      }

      .file-entry {
        padding: 3px 10px;
        font-size: 12px;
        font-family: 'JetBrains Mono', 'Fira Code', 'IBM Plex Mono', ui-monospace, monospace;
        color: #7a8194;
        cursor: pointer;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        border-radius: 3px;
        margin: 0 4px;
      }

      .file-entry:hover { background: #1e2030; color: #c0caf5; }
      .file-entry.active { background: #1e2030; color: #7aa2f7; }

      .file-entry.api-route { color: #4d5a7c; }
      .file-entry.api-route:hover { color: #c0caf5; }
      .file-entry.api-route.active { color: #7aa2f7; }

      .tree-separator {
        margin: 6px 10px;
        border: none;
        border-top: 1px solid #1e2030;
      }

      /* editor area */

      #editor-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      #editor-textarea {
        flex: 1;
        background: #1a1b26;
        color: #c0caf5;
        border: none;
        padding: 12px 14px;
        font-family: 'JetBrains Mono', 'Fira Code', 'IBM Plex Mono', ui-monospace, monospace;
        font-size: 12.5px;
        line-height: 1.65;
        resize: none;
        outline: none;
        min-height: 0;
      }

      #editor-textarea::placeholder { color: #414868; }

      #editor-textarea::-webkit-scrollbar { width: 4px; }
      #editor-textarea::-webkit-scrollbar-track { background: transparent; }
      #editor-textarea::-webkit-scrollbar-thumb { background: #2d2f3f; border-radius: 2px; }

      #editor-footer {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 5px 10px;
        border-top: 1px solid #2d2f3f;
        background: #16161e;
        min-height: 32px;
      }

      #editor-path {
        flex: 1;
        font-family: 'JetBrains Mono', 'Fira Code', 'IBM Plex Mono', ui-monospace, monospace;
        font-size: 11px;
        color: #565f89;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .badge { font-family: system-ui, sans-serif; font-size: 11px; flex-shrink: 0; }
      .badge.saved    { color: #9ece6a; }
      .badge.modified { color: #e0af68; }

      #editor-save {
        background: transparent;
        color: #565f89;
        border: 1px solid #2d2f3f;
        border-radius: 3px;
        padding: 2px 10px;
        font-size: 11px;
        cursor: pointer;
        font-family: system-ui, sans-serif;
        flex-shrink: 0;
      }

      #editor-save:hover { color: #7aa2f7; border-color: #414868; }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <label for="category-select">Examples:</label>
      <select id="category-select">
        <option value="basics">Basics — simple request/response tests</option>
        <option value="diffs">Diffs — readable output when a test fails</option>
        <option value="matchers">Matchers — $gt, $between, $valid_url, $unique, ...</option>
        <option value="variables">Variables — store values and reuse them across tests</option>
        <option value="oauth">OAuth — login, refresh tokens, authenticated requests</option>
        <option value="headers">Headers — check response headers, send custom headers</option>
        <option value="graphql">GraphQL — subset matching on deeply nested responses</option>
        <option value="readme">README examples — the tests from the project README</option>
      </select>
      <span class="hint">← switch examples</span>
      <div class="spacer"></div>
      <button id="toggle-editor">hide editor</button>
    </div>
    <div id="workspace">
      <div id="terminal"></div>
      <div id="editor-panel">
        <div id="file-tree"></div>
        <div id="editor-area">
          <textarea
            id="editor-textarea"
            spellcheck="false"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            placeholder="← click a file to edit"
          ></textarea>
          <div id="editor-footer">
            <span id="editor-path"></span>
            <span id="editor-badge" class="badge"></span>
            <button id="editor-save">save</button>
          </div>
        </div>
      </div>
    </div>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var p = params.get('overlay') ? '' : (params.get('category') || 'basics');
        var sel = document.getElementById('category-select');
        if (p) sel.value = p;
        sel.addEventListener('change', function () {
          var url = new URL(window.location.href);
          url.searchParams.set('category', sel.value);
          url.searchParams.delete('overlay');
          url.searchParams.delete('command');
          url.searchParams.delete('run');
          window.location.href = url.toString();
        });
      })();
    </script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
